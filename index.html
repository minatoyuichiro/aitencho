<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI店長：3部制シフト最適化デモ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slot-selected { background-color: #3b82f6; color: white; border-color: #2563eb; }
        .slot-empty { background-color: #f8fafc; color: #94a3b8; }
        .slot-result-1 { background-color: #10b981; color: white; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .cell-label { font-size: 0.65rem; display: block; margin-bottom: 2px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-indigo-600 to-blue-500 p-6 text-white text-center">
            <h1 class="text-3xl font-extrabold tracking-tight">AI店長：3部制シフト最適化</h1>
            <p class="text-blue-100 mt-2">「午前・午後・夜間」の複雑な条件を量子アルゴリズムで解決</p>
        </div>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="bg-amber-50 p-4 rounded-xl border border-amber-200">
                    <h2 class="font-bold text-amber-800 mb-2 flex items-center">📌 基本ルール</h2>
                    <ul class="text-sm text-amber-700 space-y-1">
                        <li>1スロット(午前/午後/夜)につき、必ず<strong>1人</strong>配置。</li>
                        <li>スタッフの「出勤可能（青いマス）」を優先します。</li>
                    </ul>
                </div>
                <div class="bg-rose-50 p-4 rounded-xl border border-rose-200">
                    <h2 class="font-bold text-rose-800 mb-2 flex items-center">⚖️ 追加された「こだわり」制約</h2>
                    <ul class="text-sm text-rose-700 space-y-1">
                        <li><strong>長時間労働防止:</strong> 同じ人が1日に3回入るのは禁止。</li>
                        <li><strong>夜勤明け配慮:</strong> 夜間に働いた人は、翌朝は休み。</li>
                        <li><strong>均等割り当て:</strong> 特定の人に仕事が偏らないように調整。</li>
                    </ul>
                </div>
            </div>

            <div class="overflow-x-auto bg-white rounded-lg border border-gray-200 shadow-sm mb-8">
                <table class="w-full text-center border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-gray-600 text-sm">
                            <th class="p-3 border-b">スタッフ</th>
                            <th colspan="3" class="p-3 border-b border-r">月曜</th>
                            <th colspan="3" class="p-3 border-b border-r">火曜</th>
                            <th colspan="3" class="p-3 border-b border-r">水曜</th>
                            <th colspan="3" class="p-3 border-b border-r">木曜</th>
                            <th colspan="3" class="p-3 border-b">金曜</th>
                        </tr>
                        <tr class="text-[10px] bg-slate-50 text-gray-400">
                            <th class="border-b border-r"></th>
                            <th class="border-b">前</th><th class="border-b">後</th><th class="border-b border-r">夜</th>
                            <th class="border-b">前</th><th class="border-b">後</th><th class="border-b border-r">夜</th>
                            <th class="border-b">前</th><th class="border-b">後</th><th class="border-b border-r">夜</th>
                            <th class="border-b">前</th><th class="border-b">後</th><th class="border-b border-r">夜</th>
                            <th class="border-b">前</th><th class="border-b">後</th><th class="border-b">夜</th>
                        </tr>
                    </thead>
                    <tbody id="input-grid"></tbody>
                </table>
            </div>

            <div class="text-center space-y-4">
                <button id="solve-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 px-12 rounded-full transition-all shadow-xl transform hover:scale-105 active:scale-95 text-lg">
                    最適なシフトを生成する
                </button>
                <div id="status" class="text-sm font-mono text-indigo-500 font-bold h-6 italic"></div>
            </div>

            <div id="result-area" class="mt-12 hidden border-t-4 border-emerald-500 pt-8">
                <h2 class="text-2xl font-black text-gray-800 mb-6 text-center">✨ AI店長が出した最適解</h2>
                <div class="overflow-x-auto rounded-xl border-2 border-emerald-100">
                    <table class="w-full text-center border-collapse">
                        <thead id="result-head" class="bg-emerald-50 text-emerald-900 text-sm"></thead>
                        <tbody id="result-grid"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Bqubo クラス ---
        class Bqubo {
            constructor(qubo, params = {}) {
                this.qubo = qubo;
                this.params = { kTinit: 15.0, cl: 0.99, kTF: 0.01, rpt: 3000 };
            }
            async solve(onStep) {
                const workerCode = `
                    self.onmessage = function(e) {
                        const { n, linear, adjTo, adjWeight, adjCount, offsets, kTinit, cl, kTF, rpt } = e.data;
                        const state = new Uint8Array(n);
                        for(let i=0; i<n; i++) state[i] = Math.random() > 0.5 ? 1 : 0;
                        let kT = kTinit;
                        while(kT > kTF) {
                            for (let r = 0; r < rpt; r++) {
                                const i = (Math.random() * n) | 0;
                                let localField = linear[i];
                                const start = offsets[i];
                                const count = adjCount[i];
                                for (let k = 0; k < count; k++) {
                                    const idx = start + k;
                                    if (state[adjTo[idx]] === 1) localField += adjWeight[idx];
                                }
                                const deltaE = (state[i] === 0) ? localField : -localField;
                                if (deltaE <= 0 || Math.random() < Math.exp(-deltaE / kT)) state[i] ^= 1;
                            }
                            kT *= cl;
                            self.postMessage({ state, kT, finished: false });
                        }
                        self.postMessage({ state, kT, finished: true });
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                const rawNodes = Array.from(new Set(Object.keys(this.qubo).flatMap(k => k.split(',').map(Number)))).sort((a,b)=>a-b);
                const map = new Map(rawNodes.map((n, i) => [n, i]));
                const N = rawNodes.length;
                const linear = new Float64Array(N);
                const tempAdj = Array.from({ length: N }, () => []);
                let totalEdges = 0;
                for (let key in this.qubo) {
                    const parts = key.split(',').map(Number);
                    const w = this.qubo[key];
                    const i = map.get(parts[0]);
                    if (parts.length === 1 || parts[0] === parts[1]) { linear[i] += w; } 
                    else {
                        const j = map.get(parts[1]);
                        tempAdj[i].push({to: j, w: w}); tempAdj[j].push({to: i, w: w});
                        totalEdges += 2;
                    }
                }
                const adjTo = new Int32Array(totalEdges);
                const adjWeight = new Float64Array(totalEdges);
                const adjCount = new Int32Array(N);
                const offsets = new Int32Array(N);
                let currentPos = 0;
                for (let i = 0; i < N; i++) {
                    offsets[i] = currentPos; adjCount[i] = tempAdj[i].length;
                    for (let edge of tempAdj[i]) {
                        adjTo[currentPos] = edge.to; adjWeight[currentPos] = edge.w;
                        currentPos++;
                    }
                }
                return new Promise((resolve) => {
                    worker.postMessage({ n: N, linear, adjTo, adjWeight, adjCount, offsets, ...this.params }, [linear.buffer, adjTo.buffer, adjWeight.buffer, adjCount.buffer, offsets.buffer]);
                    worker.onmessage = (e) => {
                        const { state, kT, finished } = e.data;
                        if (onStep) onStep(state, kT);
                        if (finished) {
                            worker.terminate(); URL.revokeObjectURL(blob);
                            const res = {}; rawNodes.forEach((node, idx) => res[node] = state[idx]);
                            resolve(res);
                        }
                    };
                });
            }
        }

        // --- 設定 ---
        const staffs = ["辰巳くん", "門間さん", "湊さん", "新人A"];
        const days = ["月", "火", "水", "木", "金"];
        const slots = ["午前", "午後", "夜間"];
        const totalSlots = days.length * slots.length; // 15
        let wishlist = Array(staffs.length).fill().map(() => Array(totalSlots).fill(1));

        // 初期化
        function init() {
            const grid = document.getElementById('input-grid');
            staffs.forEach((staff, sIdx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-3 border-r font-bold bg-slate-50 text-sm">${staff}</td>`;
                for (let i = 0; i < totalSlots; i++) {
                    const td = document.createElement('td');
                    td.className = `p-2 border cursor-pointer transition-all slot-selected`;
                    td.innerHTML = `<span class="cell-label text-blue-200">${slots[i % 3]}</span>`;
                    td.onclick = () => {
                        wishlist[sIdx][i] = wishlist[sIdx][i] ? 0 : 1;
                        td.className = `p-2 border cursor-pointer transition-all ${wishlist[sIdx][i] ? 'slot-selected' : 'slot-empty'}`;
                    };
                    tr.appendChild(td);
                }
                grid.appendChild(tr);
            });
        }

        async function solve() {
            document.getElementById('solve-btn').disabled = true;
            const qubo = {};
            const P = 20.0; // 強制制約の重み
            
            // 変数インデックス: s * totalSlots + i

            // 1. 各スロットに1人 (Σ x_si = 1)
            for (let i = 0; i < totalSlots; i++) {
                for (let s1 = 0; s1 < staffs.length; s1++) {
                    const idx1 = s1 * totalSlots + i;
                    qubo[idx1] = (qubo[idx1] || 0) - P;
                    for (let s2 = s1 + 1; s2 < staffs.length; s2++) {
                        const idx2 = s2 * totalSlots + i;
                        qubo[`${idx1},${idx2}`] = (qubo[`${idx1},${idx2}`] || 0) + 2 * P;
                    }
                }
            }

            // 2. 1日3連勤（午前・午後・夜間すべて）を禁止
            for (let s = 0; s < staffs.length; s++) {
                for (let d = 0; d < days.length; d++) {
                    const m = s * totalSlots + d * 3;     // 午前
                    const a = s * totalSlots + d * 3 + 1; // 午後
                    const n = s * totalSlots + d * 3 + 2; // 夜間
                    // 3つ選ばれるとペナルティ
                    qubo[`${m},${a}`] = (qubo[`${m},${a}`] || 0) + P/2;
                    qubo[`${a},${n}`] = (qubo[`${a},${n}`] || 0) + P/2;
                    qubo[`${m},${n}`] = (qubo[`${m},${n}`] || 0) + P/2;
                }
            }

            // 3. 夜勤明けの午前出勤を禁止 (夜勤d と 午前d+1)
            for (let s = 0; s < staffs.length; s++) {
                for (let d = 0; d < days.length - 1; d++) {
                    const night = s * totalSlots + d * 3 + 2;
                    const nextMorning = s * totalSlots + (d + 1) * 3;
                    qubo[`${night},${nextMorning}`] = (qubo[`${night},${nextMorning}`] || 0) + P;
                }
            }

            // 4. 均等化（各スタッフの合計勤務数を近づける）
            for (let s = 0; s < staffs.length; s++) {
                for (let i = 0; i < totalSlots; i++) {
                    const idx1 = s * totalSlots + i;
                    for (let j = i + 1; j < totalSlots; j++) {
                        const idx2 = s * totalSlots + j;
                        qubo[`${idx1},${idx2}`] = (qubo[`${idx1},${idx2}`] || 0) + 0.5; // ゆるい相互排他
                    }
                }
            }

            // 5. 希望コスト
            for (let s = 0; s < staffs.length; s++) {
                for (let i = 0; i < totalSlots; i++) {
                    const idx = s * totalSlots + i;
                    if (wishlist[s][i] === 0) qubo[idx] = (qubo[idx] || 0) + P; // 不可の日にいれると大ペナルティ
                }
            }

            const solver = new Bqubo(qubo);
            const result = await solver.solve((_, kT) => {
                document.getElementById('status').innerText = `量子アニーリング実行中... 温度: ${kT.toFixed(3)}`;
            });

            document.getElementById('status').innerText = "最適解が見つかりました！";
            renderResult(result);
            document.getElementById('solve-btn').disabled = false;
        }

        function renderResult(result) {
            const area = document.getElementById('result-area');
            const head = document.getElementById('result-head');
            const body = document.getElementById('result-grid');
            area.classList.remove('hidden');
            body.innerHTML = "";
            
            // ヘッダー作成
            let headHtml = `<tr><th class="p-3 border-r">スタッフ</th>`;
            days.forEach(d => headHtml += `<th colspan="3" class="p-3 border-r border-b">${d}曜</th>`);
            head.innerHTML = headHtml + `</tr>`;

            // ボディ作成
            staffs.forEach((staff, sIdx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-3 border-r font-bold text-sm bg-slate-50">${staff}</td>`;
                for (let i = 0; i < totalSlots; i++) {
                    const isWork = result[sIdx * totalSlots + i] === 1;
                    const td = document.createElement('td');
                    td.className = `p-2 border text-[10px] ${isWork ? 'slot-result-1 font-bold' : 'text-gray-300'}`;
                    td.innerText = isWork ? "出勤" : "-";
                    tr.appendChild(td);
                }
                body.appendChild(tr);
            });
            window.scrollTo({ top: area.offsetTop, behavior: 'smooth' });
        }

        document.getElementById('solve-btn').onclick = solve;
        init();
    </script>
</body>
</html>
